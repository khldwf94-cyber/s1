<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N7L Store | التحقق من الهوية</title>
    <style>
        :root {
            --bg-color: #0b0c10;
            --secondary-bg: #1f2833;
            --text-color: #c5c6c7;
            --accent-color: #833ab4;
            --gradient-accent: linear-gradient(45deg, #833ab4, #fd1d1d, #fcb045);
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            /* كود حماية الحماية: منع التحديد */
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
        .login-box {
            background-color: var(--secondary-bg);
            padding: 30px;
            border-radius: 12px;
            border: 1px solid rgba(131, 58, 180, 0.4);
            text-align: center;
            width: 350px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        h2 { color: #fff; margin-bottom: 20px; }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #444;
            background-color: #0b0c10;
            color: #fff;
            text-align: center;
            box-sizing: border-box;
        }
        .btn {
            background: var(--gradient-accent);
            color: #fff;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        .message { margin-top: 15px; font-size: 0.9rem; color: #ff4a4a; }
        .success-msg { color: #2ecc71; }
        
        /* منع الطباعة */
        @media print { body { display: none !important; } }
    </style>
</head>
<body>

    <div class="login-box" id="authBox">
        <h2>بوابة التحقق N7L</h2>
        <p style="font-size: 0.85rem; color: #aaa;">مسموح فقط للفئات (الثالثة، الخامسة، السادسة)</p>
        
        <div id="step1">
            <input type="text" id="userId" placeholder="أدخل الآيدي (ID) الخاص بك">
            <button class="btn" onclick="sendId()">إرسال كود التحقق</button>
        </div>

        <div id="step2" style="display: none;">
            <input type="text" id="otpCode" placeholder="أدخل الكود المستلم (صالح لدقيقة)">
            <button class="btn" onclick="sendOtp()">دخول الموقع</button>
        </div>

        <div class="message" id="msg"></div>
    </div>

    <script>
        // 1. منع قائمة كليك يمين والنسخ على الروابط وكل شيء
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
            return false;
        });

        // 2. منع الضغط المطول
        document.addEventListener('touchstart', function(e) {
            if (e.target.tagName === 'A') {
                e.target.style.webkitTouchCallout = 'none';
            }
        }, {passive: true});

        // 3. منع اختصارات الكيبورد (نسخ، حفظ، أدوات مطور)
        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey && (e.keyCode === 67 || e.keyCode === 83 || e.keyCode === 85 || e.keyCode === 80) || e.keyCode === 123) {
                e.preventDefault();
                return false;
            }
        });

        // 4. خدعة الشاشة السوداء عند التسجيل
        window.addEventListener('blur', function() {
            let blackOverlay = document.getElementById('black-screen-protect');
            if (!blackOverlay) {
                blackOverlay = document.createElement('div');
                blackOverlay.id = 'black-screen-protect';
                blackOverlay.style.position = 'fixed';
                blackOverlay.style.top = '0';
                blackOverlay.style.left = '0';
                blackOverlay.style.width = '100vw';
                blackOverlay.style.height = '100vh';
                blackOverlay.style.backgroundColor = 'black';
                blackOverlay.style.zIndex = '9999999';
                document.body.appendChild(blackOverlay);
            }
        });
        window.addEventListener('focus', function() {
            let blackOverlay = document.getElementById('black-screen-protect');
            if (blackOverlay) blackOverlay.remove();
        });

        // كود النظام الأصلي
        let currentUserId = "";
        function sendId() {
            const id = document.getElementById('userId').value;
            if(!id) return alert('الرجاء كتابة الآيدي');
            currentUserId = id;
            fetch('/api/verify-id', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ user_id: id })
            })
            .then(res => res.json())
            .then(data => {
                const msgDiv = document.getElementById('msg');
                if(data.status === 'success') {
                    msgDiv.className = "message success-msg";
                    msgDiv.innerText = data.message;
                    document.getElementById('step1').style.display = 'none';
                    document.getElementById('step2').style.display = 'block';
                } else {
                    msgDiv.className = "message";
                    msgDiv.innerText = data.message;
                }
            });
        }

        function sendOtp() {
            const code = document.getElementById('otpCode').value;
            if(!code) return alert('الرجاء كتابة كود التحقق');
            fetch('/api/verify-otp', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ user_id: currentUserId, code: code })
            })
            .then(res => res.json())
            .then(data => {
                const msgDiv = document.getElementById('msg');
                if(data.status === 'success') {
                    localStorage.setItem('session_token', data.session_token);
                    alert('تم التحقق بنجاح! مسموح لك بالدخول لمدة 60 دقيقة.');
                    window.location.href = `/?room=${data.redirect_token}`;
                } else {
                    msgDiv.className = "message";
                    msgDiv.innerText = data.message;
                }
            });
        }
    </script>
</body>
</html>
